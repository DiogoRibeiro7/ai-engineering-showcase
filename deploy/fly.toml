# Fly.io configuration for the AI Engineering Showcase API.
#
# Deploys the FastAPI service straight from the repository Dockerfile. The
# default `local` LLM provider needs no API keys, so this runs for free with no
# secrets. To use a hosted LLM provider, set the key as a Fly secret instead of
# committing it, e.g.:
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...
#   fly secrets set AI_SHOWCASE_LLM_PROVIDER=anthropic
#
# Deploy from the repo root:
#   fly launch --no-deploy --copy-config --name <APP_NAME>   # first time
#   fly deploy --config deploy/fly.toml --dockerfile Dockerfile

app = "feedback-intelligence-agent"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile"

[env]
  AI_SHOWCASE_DATA_PATH = "data/sample_feedback.csv"
  AI_SHOWCASE_INDEX_PATH = "/app/.artifacts/vector_store.json"
  AI_SHOWCASE_LLM_PROVIDER = "local"
  AI_SHOWCASE_RETRIEVER_TYPE = "dense"
  # Non-secret config only. Set secrets with `fly secrets set ...`.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    # Liveness probe.
    method = "get"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

  [[http_service.checks]]
    # Readiness probe.
    method = "get"
    path = "/ready"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
